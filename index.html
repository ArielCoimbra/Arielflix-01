<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Dinâmico de Avaliação Veicular</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- jsPDF e AutoTable -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans pb-28">

  <!-- Header -->
  <header class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50 shadow-md">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center font-black text-white text-lg shadow-lg shadow-blue-500/30">A</div>
        <div>
          <h1 class="text-base font-bold tracking-wide text-white leading-none">AUTOEVAL <span class="text-blue-500 text-xs">PRO</span></h1>
          <span class="text-[10px] text-slate-400">Avaliação Técnica e Estética Veicular</span>
        </div>
      </div>
      <span class="text-xs bg-blue-500/10 text-blue-400 border border-blue-500/20 px-3 py-1 rounded-full font-medium">Modo Vistoriador</span>
    </div>
  </header>

  <main class="max-w-6xl mx-auto p-4 space-y-6 mt-2">

    <!-- 1. Dados Gerais da Avaliação -->
    <section class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl">
      <h2 class="text-xs font-bold text-blue-400 uppercase tracking-wider mb-4 flex items-center gap-2">
        <span class="bg-blue-500/20 text-blue-400 w-5 h-5 rounded-full flex items-center justify-center text-[10px]">1</span>
        Dados do Veículo e Avaliação
      </h2>
      
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Marca</label>
          <select id="marca" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-sm text-white focus:border-blue-500 focus:outline-none">
            <option value="">Selecione...</option>
            <option value="FORD">FORD</option>
            <option value="VOLKSWAGEN">VOLKSWAGEN</option>
            <option value="CHEVROLET">CHEVROLET</option>
            <option value="FIAT">FIAT</option>
            <option value="TOYOTA">TOYOTA</option>
            <option value="HONDA">HONDA</option>
            <option value="HYUNDAI">HYUNDAI</option>
            <option value="RENAULT">RENAULT</option>
            <option value="JEEP">JEEP</option>
            <option value="NISSAN">NISSAN</option>
            <option value="RAM">RAM</option>
            <option value="BMW">BMW</option>
            <option value="MERCEDES-BENZ">MERCEDES-BENZ</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Modelo / Versão</label>
          <input type="text" id="modelo" placeholder="Ex: RANGER LIMITED 3.2" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-sm text-white focus:border-blue-500 focus:outline-none">
        </div>

        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Placa</label>
          <input type="text" id="placa" placeholder="SES4G11" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-sm text-white uppercase focus:border-blue-500 focus:outline-none">
        </div>

        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Ano Fab / Mod</label>
          <input type="text" id="ano" placeholder="2023/2023" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-sm text-white focus:border-blue-500 focus:outline-none">
        </div>

        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Cor</label>
          <input type="text" id="cor" placeholder="BRANCA" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-sm text-white focus:border-blue-500 focus:outline-none">
        </div>

        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Quilometragem (KM)</label>
          <input type="text" id="km" placeholder="89744" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-sm text-white focus:border-blue-500 focus:outline-none">
        </div>

        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Combustível</label>
          <select id="combustivel" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-sm text-white focus:border-blue-500 focus:outline-none">
            <option value="DIESEL">DIESEL</option>
            <option value="FLEX">FLEX</option>
            <option value="GASOLINA">GASOLINA</option>
            <option value="ELÉTRICO / HÍBRIDO">ELÉTRICO / HÍBRIDO</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Cliente / Solicitante</label>
          <input type="text" id="cliente" placeholder="Ex: UNIDAS / PARTICULAR" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-sm text-white focus:border-blue-500 focus:outline-none">
        </div>
      </div>
    </section>

    <!-- 2. Checklist de Testes Funcionais & Estrutura (Com opção de Foto Dinâmica) -->
    <section class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl">
      <h2 class="text-xs font-bold text-blue-400 uppercase tracking-wider mb-4 flex items-center gap-2">
        <span class="bg-blue-500/20 text-blue-400 w-5 h-5 rounded-full flex items-center justify-center text-[10px]">2</span>
        Status dos Itens e Acessórios
      </h2>

      <div class="space-y-3" id="checklist-container">
        <!-- Itens injetados via JS -->
      </div>
    </section>

    <!-- 3. Fotos Guiadas Padrão -->
    <section class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xs font-bold text-blue-400 uppercase tracking-wider flex items-center gap-2">
          <span class="bg-blue-500/20 text-blue-400 w-5 h-5 rounded-full flex items-center justify-center text-[10px]">3</span>
          Registros Fotográficos Principais
        </h2>
        <span class="text-[11px] text-slate-500">Toque para ativar a câmera</span>
      </div>

      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3" id="grid-fotos-padrao">
        <!-- Slots de fotos padrão criados via JS -->
      </div>
    </section>

    <!-- 4. Fotos Adicionais Ilimitadas -->
    <section class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xs font-bold text-blue-400 uppercase tracking-wider flex items-center gap-2">
          <span class="bg-blue-500/20 text-blue-400 w-5 h-5 rounded-full flex items-center justify-center text-[10px]">4</span>
          Fotos Adicionais / Avarias Extras
        </h2>
        <button type="button" onclick="adicionarFotoExtra()" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold py-1.5 px-3 rounded-lg shadow transition flex items-center gap-1">
          <span>+ Tirar Outra Foto</span>
        </button>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4" id="container-fotos-extras">
        <!-- Fotos adicionais aparecem aqui -->
      </div>
    </section>

    <!-- 5. Resumo e Parecer do Avaliador -->
    <section class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl">
      <h2 class="text-xs font-bold text-blue-400 uppercase tracking-wider mb-4 flex items-center gap-2">
        <span class="bg-blue-500/20 text-blue-400 w-5 h-5 rounded-full flex items-center justify-center text-[10px]">5</span>
        Parecer Geral de Avaliação
      </h2>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Situação Geral do Veículo</label>
          <select id="situacao-geral" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-sm font-bold text-white focus:outline-none">
            <option value="CONFORME (SEM APONTAMENTOS)" class="text-emerald-400">CONFORME (SEM APONTAMENTOS)</option>
            <option value="NÃO CONFORME (POSSUI AVARIAS / PENDÊNCIAS)" class="text-red-400">NÃO CONFORME (POSSUI AVARIAS / PENDÊNCIAS)</option>
            <option value="RESSALVA TÉCNICA (OBSERVAÇÕES ESTÉTICAS)" class="text-amber-400">RESSALVA TÉCNICA (OBSERVAÇÕES ESTÉTICAS)</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Observações Detalhadas do Avaliador</label>
          <textarea id="observacoes" rows="3" placeholder="Apontamentos de pintura, arranhões, ausência de chave reserva, vidros trocados, TWI dos pneus, etc..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-sm text-white focus:border-blue-500 focus:outline-none"></textarea>
        </div>
      </div>
    </section>

  </main>

  <!-- Barra de Ação Fixo no Rodapé -->
  <div class="fixed bottom-0 left-0 right-0 bg-slate-950/90 backdrop-blur border-t border-slate-800 p-4 z-40">
    <div class="max-w-6xl mx-auto flex justify-end">
      <button onclick="gerarPDF()" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition flex items-center justify-center gap-2 text-sm">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
        </svg>
        Gerar Relatório de Avaliação (PDF)
      </button>
    </div>
  </div>

  <script>
    // Lista de Fotos Padrão Requeridas
    const fotosPadrao = [
      { id: 'f_frente', label: 'Frente 90°' },
      { id: 'f_tras', label: 'Traseira 90°' },
      { id: 'f_lat_dir', label: 'Lat. Direita 90°' },
      { id: 'f_lat_esq', label: 'Lat. Esquerda 90°' },
      { id: 'f_km', label: 'Painel / Odômetro (Ligado)' },
      { id: 'f_motor', label: 'Compartimento Motor' },
      { id: 'f_chassi', label: 'Gravação do Chassi' },
      { id: 'f_vidros', label: 'Gravação de Vidros' }
    ];

    // Lista de Itens do Checklist
    const itensChecklist = [
      'Funcionamento do Motor e Câmbio',
      'Painel de Instrumentos / Odômetro',
      'Ar Condicionado e Ventilação',
      'Multimídia / Rádio / Som',
      'Chassi e Gravações de Vidro',
      'Estrutura (Longarinas e Torres)',
      'Pneus e Estepe (Banda TWI)',
      'Estética / Pintura / Funilaria'
    ];

    const dadosFotosPadrao = {};
    const dadosChecklist = {};
    const fotosExtrasArray = [];

    // Renderizar Checklist
    const checklistContainer = document.getElementById('checklist-container');
    itensChecklist.forEach((item, index) => {
      const itemId = `item_ck_${index}`;
      dadosChecklist[itemId] = { nome: item, status: 'CONFORME', obs: '', foto: null };
      
      const div = document.createElement('div');
      div.className = 'bg-slate-950 p-3 rounded-xl border border-slate-800/80 space-y-3';
      div.innerHTML = `
        <div class="flex items-center justify-between gap-2">
          <span class="text-xs font-medium text-slate-300 truncate">${item}</span>
          <div class="flex items-center gap-1.5 shrink-0">
            <button type="button" onclick="setStatusItem('${itemId}', 'CONFORME', this)" class="btn-ck-${itemId} text-[10px] px-2.5 py-1 rounded-lg font-bold bg-emerald-600 text-white border border-emerald-500">OK</button>
            <button type="button" onclick="setStatusItem('${itemId}', 'AVARIA/OBS', this)" class="btn-ck-${itemId} text-[10px] px-2.5 py-1 rounded-lg font-bold bg-slate-800 text-slate-400 border border-slate-700">Obs / Avaria</button>
          </div>
        </div>

        <!-- Módulo Expansível de Observação + Foto Opcional -->
        <div id="box-obs-${itemId}" class="hidden space-y-2 pt-2 border-t border-slate-800/60">
          <input type="text" placeholder="Digite a observação do item (ex: risco leve, ruído)..." onchange="atualizarObsItem('${itemId}', this.value)" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-2 text-xs text-white focus:outline-none">
          
          <div class="flex items-center gap-3">
            <div class="relative bg-slate-900 border border-dashed border-slate-700 rounded-lg px-3 py-2 text-center flex-grow cursor-pointer flex items-center justify-center gap-2">
              <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h0.93a2 2 0 001.664-.89l0.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l0.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
              <span id="label-foto-${itemId}" class="text-[11px] text-slate-400 font-medium">Foto do Item (Opcional)</span>
              <input type="file" accept="image/*" capture="environment" onchange="capturarFotoItem(event, '${itemId}')" class="absolute inset-0 opacity-0 cursor-pointer">
            </div>
            <div id="preview-foto-${itemId}" class="w-10 h-10 bg-slate-900 border border-slate-800 rounded-lg hidden overflow-hidden shrink-0"></div>
          </div>
        </div>
      `;
      checklistContainer.appendChild(div);
    });

    function setStatusItem(id, status, btn) {
      dadosChecklist[id].status = status;
      const parent = btn.parentElement;
      const buttons = parent.querySelectorAll(`.btn-ck-${id}`);
      const boxObs = document.getElementById(`box-obs-${id}`);
      
      buttons.forEach(b => {
        b.className = `btn-ck-${id} text-[10px] px-2.5 py-1 rounded-lg font-bold bg-slate-800 text-slate-400 border border-slate-700`;
      });

      if (status === 'CONFORME') {
        btn.className = `btn-ck-${id} text-[10px] px-2.5 py-1 rounded-lg font-bold bg-emerald-600 text-white border border-emerald-500`;
        boxObs.classList.add('hidden');
      } else {
        btn.className = `btn-ck-${id} text-[10px] px-2.5 py-1 rounded-lg font-bold bg-amber-600 text-white border border-amber-500`;
        boxObs.classList.remove('hidden');
      }
    }

    function atualizarObsItem(id, val) {
      dadosChecklist[id].obs = val;
    }

    function capturarFotoItem(event, id) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          dadosChecklist[id].foto = e.target.result;
          const label = document.getElementById(`label-foto-${id}`);
          const prev = document.getElementById(`preview-foto-${id}`);
          label.innerText = "Foto Anexada ✔";
          label.classList.add("text-emerald-400");
          prev.innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
          prev.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      }
    }

    // Renderizar Slots de Fotos Padrão
    const gridPadrao = document.getElementById('grid-fotos-padrao');
    fotosPadrao.forEach(item => {
      const card = document.createElement('div');
      card.className = 'bg-slate-950 border border-slate-800 rounded-xl p-2 flex flex-col gap-1.5';
      card.innerHTML = `
        <span class="text-[10px] font-bold text-slate-400 uppercase truncate">${item.label}</span>
        <div class="relative h-28 bg-slate-900 rounded-lg border border-dashed border-slate-800 flex flex-col items-center justify-center overflow-hidden" id="preview-${item.id}">
          <svg class="w-5 h-5 text-slate-600 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h0.93a2 2 0 001.664-.89l0.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l0.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
          <span class="text-[10px] text-slate-500">Capturar</span>
          <input type="file" accept="image/*" capture="environment" onchange="capturarFotoPadrao(event, '${item.id}')" class="absolute inset-0 opacity-0 cursor-pointer">
        </div>
      `;
      gridPadrao.appendChild(card);
    });

    function capturarFotoPadrao(event, id) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          dadosFotosPadrao[id] = e.target.result;
          const container = document.getElementById(`preview-${id}`);
          container.innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
        };
        reader.readAsDataURL(file);
      }
    }

    // Função de Adicionar Fotos Extras Dinâmicas
    let contadorExtra = 0;
    function adicionarFotoExtra() {
      contadorExtra++;
      const extraId = `extra_${contadorExtra}_${Date.now()}`;
      const objExtra = { id: extraId, foto: null, obs: '' };
      fotosExtrasArray.push(objExtra);

      const container = document.getElementById('container-fotos-extras');
      const card = document.createElement('div');
      card.id = `card-extra-${extraId}`;
      card.className = 'bg-slate-950 border border-slate-800 rounded-xl p-3 flex flex-col gap-2 relative';
      card.innerHTML = `
        <button type="button" onclick="removerFotoExtra('${extraId}')" class="absolute top-2 right-2 bg-red-600/80 hover:bg-red-600 text-white rounded-full p-1 text-xs z-10">✕</button>
        <span class="text-[10px] font-bold text-slate-400 uppercase">Foto Adicional #${contadorExtra}</span>
        
        <div class="relative h-32 bg-slate-900 rounded-lg border border-dashed border-slate-800 flex flex-col items-center justify-center overflow-hidden" id="preview-${extraId}">
          <svg class="w-6 h-6 text-slate-600 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h0.93a2 2 0 001.664-.89l0.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l0.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
          <span class="text-xs text-slate-500">Toque para tirar foto</span>
          <input type="file" accept="image/*" capture="environment" onchange="capturarFotoExtra(event, '${extraId}')" class="absolute inset-0 opacity-0 cursor-pointer">
        </div>

        <input type="text" placeholder="Observação desta foto..." onchange="atualizarObsExtra('${extraId}', this.value)" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-2 text-xs text-white focus:outline-none">
      `;
      container.appendChild(card);
    }

    function removerFotoExtra(id) {
      const idx = fotosExtrasArray.findIndex(item => item.id === id);
      if (idx !== -1) fotosExtrasArray.splice(idx, 1);
      const card = document.getElementById(`card-extra-${id}`);
      if (card) card.remove();
    }

    function capturarFotoExtra(event, id) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const item = fotosExtrasArray.find(x => x.id === id);
          if (item) item.foto = e.target.result;
          const container = document.getElementById(`preview-${id}`);
          container.innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
        };
        reader.readAsDataURL(file);
      }
    }

    function atualizarObsExtra(id, val) {
      const item = fotosExtrasArray.find(x => x.id === id);
      if (item) item.obs = val;
    }

    // Geração do PDF
    function gerarPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      const marca = document.getElementById('marca').value || 'N/A';
      const modelo = document.getElementById('modelo').value || 'N/A';
      const placa = (document.getElementById('placa').value || 'SEM-PLACA').toUpperCase();
      const ano = document.getElementById('ano').value || 'N/A';
      const cor = document.getElementById('cor').value || 'N/A';
      const km = document.getElementById('km').value || 'N/A';
      const combustivel = document.getElementById('combustivel').value;
      const cliente = document.getElementById('cliente').value || 'N/A';
      const situacao = document.getElementById('situacao-geral').value;
      const observacoes = document.getElementById('observacoes').value || 'Sem observações registradas no ato da avaliação.';

      // Cabeçalho
      doc.setFillColor(15, 23, 42);
      doc.rect(0, 0, 210, 28, 'F');
      
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(15);
      doc.setFont('helvetica', 'bold');
      doc.text("RELATÓRIO DE AVALIAÇÃO VEICULAR", 14, 14);
      
      doc.setFontSize(8);
      doc.setFont('helvetica', 'normal');
      doc.text(`Data/Hora: ${new Date().toLocaleDateString('pt-BR')} ${new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})} | Código: #${Math.floor(100000 + Math.random() * 900000)}`, 14, 21);

      // Status Geral
      if(situacao.includes('CONFORME (SEM')) doc.setTextColor(16, 185, 129);
      else if(situacao.includes('RESSALVA')) doc.setTextColor(245, 158, 11);
      else doc.setTextColor(239, 68, 68);

      doc.setFontSize(10);
      doc.setFont('helvetica', 'bold');
      doc.text(situacao.split(' ')[0], 196, 17, { align: 'right' });

      // Tabela 1: Dados do Veículo
      doc.autoTable({
        startY: 32,
        head: [['Marca/Modelo', 'Placa', 'Ano/Mod', 'Cor', 'KM', 'Combustível', 'Cliente']],
        body: [[`${marca} ${modelo}`, placa, ano, cor, km, combustivel, cliente]],
        theme: 'grid',
        headStyles: { fillStyle: 'F', fillColor: [30, 41, 59], textColor: [255, 255, 255], fontStyle: 'bold' },
        styles: { fontSize: 7.5, cellPadding: 2.5 }
      });

      // Tabela 2: Resumo do Checklist com Observações
      const checklistTable = Object.keys(dadosChecklist).map(k => {
        const item = dadosChecklist[k];
        const statusTexto = item.status === 'CONFORME' ? 'CONFORME' : `AVARIA / OBS: ${item.obs || 'Ver anexo'}`;
        return [item.nome, statusTexto];
      });

      doc.autoTable({
        startY: doc.lastAutoTable.finalY + 4,
        head: [['Item Avaliado / Inspeção', 'Status / Observação Específica']],
        body: checklistTable,
        theme: 'striped',
        headStyles: { fillColor: [30, 41, 59], fontStyle: 'bold' },
        styles: { fontSize: 7.5, cellPadding: 2 },
        didParseCell: function(data) {
          if (data.column.index === 1) {
            if (data.cell.raw.startsWith('CONFORME')) data.cell.styles.textColor = [16, 185, 129];
            else data.cell.styles.textColor = [245, 158, 11];
            data.cell.styles.fontStyle = 'bold';
          }
        }
      });

      // Parecer Final
      let currentY = doc.lastAutoTable.finalY + 6;
      doc.setTextColor(30, 41, 59);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'bold');
      doc.text("PARECER E OBSERVAÇÕES DA AVALIAÇÃO:", 14, currentY);
      
      doc.setFontSize(7.5);
      doc.setFont('helvetica', 'normal');
      const lines = doc.splitTextToSize(observacoes, 182);
      doc.text(lines, 14, currentY + 4);

      // --- MÓDULO FOTOGRÁFICO INTELIGENTE ---
      // Montar lista com todas as fotos presentes
      const fotosParaPDF = [];

      // 1. Fotos padrão que foram capturadas
      fotosPadrao.forEach(item => {
        if (dadosFotosPadrao[item.id]) {
          fotosParaPDF.push({ titulo: item.label, foto: dadosFotosPadrao[item.id], obs: '' });
        }
      });

      // 2. Fotos do checklist (avarias específicas)
      Object.keys(dadosChecklist).forEach(k => {
        const item = dadosChecklist[k];
        if (item.foto) {
          fotosParaPDF.push({ titulo: `AVARIA: ${item.nome}`, foto: item.foto, obs: item.obs || 'Sem detalhes' });
        }
      });

      // 3. Fotos extras
      fotosExtrasArray.forEach((item, idx) => {
        if (item.foto) {
          fotosParaPDF.push({ titulo: `FOTO EXTRA #${idx + 1}`, foto: item.foto, obs: item.obs || 'Sem detalhes' });
        }
      });

      if (fotosParaPDF.length > 0) {
        doc.addPage();
        
        doc.setFillColor(15, 23, 42);
        doc.rect(0, 0, 210, 14, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(9);
        doc.setFont('helvetica', 'bold');
        doc.text(`REGISTROS FOTOGRÁFICOS DO VEÍCULO - PLACA: ${placa}`, 14, 9);

        let x = 14;
        let y = 20;
        const imgWidth = 58;
        const imgHeight = 42;

        fotosParaPDF.forEach((item, idx) => {
          // Moldura do Card
          doc.setDrawColor(220, 220, 220);
          doc.rect(x, y, imgWidth, imgHeight + (item.obs ? 10 : 5));

          doc.addImage(item.foto, 'JPEG', x + 1, y + 1, imgWidth - 2, imgHeight - 2);

          // Header da Foto
          doc.setFillColor(30, 41, 59);
          doc.rect(x, y + imgHeight, imgWidth, 5, 'F');
          doc.setTextColor(255, 255, 255);
          doc.setFontSize(6);
          doc.setFont('helvetica', 'bold');
          doc.text(item.titulo.toUpperCase(), x + 2, y + imgHeight + 3.5);

          // Texto de Observação
          if (item.obs) {
            doc.setTextColor(60, 60, 60);
            doc.setFontSize(5.5);
            doc.setFont('helvetica', 'normal');
            doc.text(`Obs: ${item.obs}`, x + 2, y + imgHeight + 8.5, { maxWidth: imgWidth - 4 });
          }

          // Ajuste de Grid e Páginas
          x += imgWidth + 4;
          if ((idx + 1) % 3 === 0) {
            x = 14;
            y += imgHeight + (item.obs ? 15 : 10);
          }

          // Se estourar a página, add outra
          if (y > 250 && idx < fotosParaPDF.length - 1) {
            doc.addPage();
            y = 20;
            x = 14;
          }
        });
      }

      // Salvar PDF
      doc.save(`Avaliacao_Veicular_${placa}.pdf`);
    }
  </script>
</body>
</html>
