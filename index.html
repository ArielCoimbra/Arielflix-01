<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Laudo Cautelar Automotivo</title>

  <!-- Tailwind CSS para Estilização Completa -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- html2pdf.js para Geração Automática do PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    /* Estilos específicos para a impressão/exportação em PDF */
    @media print {
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      body { background: white; padding: 0; }
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans pb-12">

  <!-- Cabeçalho / Navbar -->
  <header class="bg-slate-900 text-white p-4 shadow-md no-print">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold tracking-wide">Vistoria Cautelar Pro</h1>
      <span class="text-xs bg-slate-800 text-slate-300 px-3 py-1 rounded-full border border-slate-700">App Web</span>
    </div>
  </header>

  <main class="max-w-4xl mx-auto mt-6 p-4">

    <!-- Formulário Principal -->
    <div class="bg-white rounded-xl shadow-lg p-6 mb-8 border border-gray-200" id="relatorio-conteudo">
      
      <!-- Cabeçalho do Laudo -->
      <div class="border-b-2 border-slate-800 pb-4 mb-6 flex justify-between items-end">
        <div>
          <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tight">LAUDO DE VISTORIA CAUTELAR</h2>
          <p class="text-sm text-gray-500">Relatório de inspeção de integridade veicular</p>
        </div>
        <div class="text-right text-xs text-gray-500">
          <p><strong>Data:</strong> <span id="data-atual">--/--/----</span></p>
          <p><strong>Código:</strong> #<span id="codigo-laudo">0000</span></p>
        </div>
      </div>

      <!-- Seção: Dados do Veículo -->
      <section class="mb-8">
        <h3 class="text-sm font-bold uppercase tracking-wider text-slate-700 mb-3 bg-gray-100 p-2 rounded border-l-4 border-slate-800">
          1. Dados do Veículo
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Marca / Modelo</label>
            <input type="text" id="veiculo" placeholder="Ex: Toyota Corolla 2.0" class="w-full p-2 text-sm border rounded focus:ring-2 focus:ring-slate-800 focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Placa</label>
            <input type="text" id="placa" placeholder="Ex: ABC-1D23" class="w-full p-2 text-sm border rounded uppercase focus:ring-2 focus:ring-slate-800 focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Ano / Modelo</label>
            <input type="text" id="ano" placeholder="Ex: 2021/2022" class="w-full p-2 text-sm border rounded focus:ring-2 focus:ring-slate-800 focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Cor</label>
            <input type="text" id="cor" placeholder="Ex: Prata" class="w-full p-2 text-sm border rounded focus:ring-2 focus:ring-slate-800 focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Quilometragem (KM)</label>
            <input type="text" id="km" placeholder="Ex: 45.000" class="w-full p-2 text-sm border rounded focus:ring-2 focus:ring-slate-800 focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Avaliador Responsável</label>
            <input type="text" id="avaliador" placeholder="Seu Nome" class="w-full p-2 text-sm border rounded focus:ring-2 focus:ring-slate-800 focus:outline-none">
          </div>
        </div>
      </section>

      <!-- Seção: Captura e Registro de Fotos -->
      <section class="mb-8">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-sm font-bold uppercase tracking-wider text-slate-700 bg-gray-100 p-2 rounded border-l-4 border-slate-800 flex-grow">
            2. Registros Fotográficos e Observações
          </h3>
        </div>

        <!-- Botão para Acionar Câmera/Upload -->
        <div class="no-print mb-6">
          <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-300 rounded-lg cursor-pointer bg-slate-50 hover:bg-slate-100 transition">
            <div class="flex flex-col items-center justify-center pt-5 pb-6">
              <svg class="w-8 h-8 mb-2 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h0.93a2 2 0 001.664-.89l0.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l0.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
              </svg>
              <p class="text-sm font-semibold text-slate-700">Tirar Foto ou Selecionar do Arquivo</p>
              <p class="text-xs text-gray-500">Toque aqui para usar a câmera do celular</p>
            </div>
            <!-- Aceita imagens e abre a câmera em dispositivos móveis -->
            <input type="file" accept="image/*" capture="environment" id="camera-input" class="hidden">
          </label>
        </div>

        <!-- Feed de Fotos Adicionadas -->
        <div id="galeria-fotos" class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- As fotos adicionadas aparecerão aqui via JS -->
        </div>
      </section>

      <!-- Parecer Final -->
      <section class="mb-6">
        <h3 class="text-sm font-bold uppercase tracking-wider text-slate-700 mb-3 bg-gray-100 p-2 rounded border-l-4 border-slate-800">
          3. Parecer Técnico Final
        </h3>
        <textarea id="parecer" rows="3" placeholder="Digite as conclusões finais da vistoria..." class="w-full p-2 text-sm border rounded focus:ring-2 focus:ring-slate-800 focus:outline-none"></textarea>
      </section>

      <!-- Rodapé do PDF -->
      <div class="mt-12 pt-6 border-t border-gray-200 text-center text-xs text-gray-400">
        <p>Documento gerado digitalmente pelo Sistema de Vistoria Cautelar.</p>
      </div>
    </div>

    <!-- Barra Ações (Fixa na Tela Mobile) -->
    <div class="no-print fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-lg flex justify-center gap-4">
      <button onclick="gerarPDF()" class="w-full max-w-md bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-6 rounded-lg shadow transition flex items-center justify-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
        </svg>
        Gerar Laudo em PDF
      </button>
    </div>

  </main>

  <script>
    // Inicializar data e código aleatório
    document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-BR');
    document.getElementById('codigo-laudo').innerText = Math.floor(1000 + Math.random() * 9000);

    const cameraInput = document.getElementById('camera-input');
    const galeriaFotos = document.getElementById('galeria-fotos');

    // Escutar mudança no input de arquivo/câmera
    cameraInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          adicionarFotoNaGaleria(event.target.result);
        };
        reader.readAsDataURL(file);
      }
      // Limpa input para permitir tirar outra foto do mesmo tipo
      this.value = '';
    });

    // Função para criar o card da foto + observações
    function adicionarFotoNaGaleria(imageSrc) {
      const cardId = 'foto-' + Date.now();
      const itemHTML = `
        <div id="${cardId}" class="bg-gray-50 border border-gray-200 rounded-lg p-3 relative flex flex-col gap-3">
          <!-- Botão excluir foto -->
          <button onclick="removerFoto('${cardId}')" class="no-print absolute top-2 right-2 bg-red-500 hover:bg-red-600 text-white rounded-full p-1.5 shadow transition" title="Excluir Foto">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
          
          <img src="${imageSrc}" class="w-full h-48 object-cover rounded border border-gray-300">
          
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">Observações do Item / Avaria:</label>
            <textarea placeholder="Ex: Detalhe de risco na pintura, pneu careca, etc." class="w-full p-2 text-xs border rounded focus:ring-1 focus:ring-slate-800 focus:outline-none bg-white" rows="2"></textarea>
          </div>
        </div>
      `;
      galeriaFotos.insertAdjacentHTML('beforeend', itemHTML);
    }

    // Função para remover um card de foto
    function removerFoto(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    // Função para gerar o PDF formatado
    function gerarPDF() {
      const elemento = document.getElementById('relatorio-conteudo');
      const placa = document.getElementById('placa').value.toUpperCase() || 'VEICULO';

      // Configurações do html2pdf
      const opcoes = {
        margin:       [10, 10, 10, 10],
        filename:     `Laudo_Cautelar_${placa}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      // Executa a conversão
      html2pdf().set(opcoes).from(elemento).save();
    }
  </script>
</body>
</html>
